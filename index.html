<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EZLaunchLab CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--bg2:#12121a;--fg:#f0f0f5;--fg-muted:#8e8e9a;--accent:#2563EB;--gold:#D4AF37;--border:rgba(255,255,255,.06);--card:rgba(255,255,255,.04);--glass:rgba(255,255,255,.03);--glow:0 0 0 1px rgba(255,255,255,.06),0 2px 12px rgba(0,0,0,.3)}
body{background:var(--bg);color:var(--fg);font-family:'Open Sans',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4,.logo{font-family:'Montserrat',sans-serif}
button{font-family:'Montserrat',sans-serif;cursor:pointer}
input,select,textarea{font-family:'Open Sans',sans-serif}
.hide{display:none!important}

.lw{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(145deg,#0a0a12,#10101a 50%,#0d0d18)}
.lb{background:rgba(22,22,32,.85);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:48px 40px;width:400px;max-width:92vw;box-shadow:0 24px 80px rgba(0,0,0,.5)}
.lr{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:10px}
.li{font-family:'Montserrat',sans-serif;font-size:20px;font-weight:900;color:var(--fg)}.li span{color:var(--accent)}
.lsub{text-align:center;color:var(--fg-muted);font-size:14px;margin:6px 0 32px}
.fld{margin-bottom:18px}
.lbl{display:block;font-family:'Montserrat',sans-serif;font-size:10px;color:var(--fg-muted);font-weight:700;text-transform:uppercase;letter-spacing:.18em;margin-bottom:6px}
.inp{width:100%;padding:13px 16px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:var(--fg);font-size:14px;outline:none;transition:all .2s}
.inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.15)}
.pww{position:relative}
.pwt{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--fg-muted);font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.bl{width:100%;padding:15px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--gold),#c9a52e);color:#121212;font-weight:800;font-size:12px;letter-spacing:.12em;text-transform:uppercase;margin-top:8px;transition:all .25s;box-shadow:0 4px 16px rgba(212,175,55,.2)}.bl:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(212,175,55,.3)}
.eb{background:rgba(239,68,68,.06);color:#ef4444;padding:12px 16px;border-radius:12px;font-size:13px;border:1px solid rgba(239,68,68,.12);margin-bottom:14px}

.d{padding:28px 40px}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.hl{display:flex;align-items:center;gap:14px}
.hlogo{font-family:'Montserrat',sans-serif;font-size:20px;font-weight:900}.hlogo span{color:var(--accent)}
.hsub{font-size:10px;color:var(--fg-muted);letter-spacing:.15em;text-transform:uppercase;font-family:'Montserrat',sans-serif;font-weight:600}
.bo{padding:9px 18px;border-radius:10px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:var(--fg-muted);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;transition:all .2s;backdrop-filter:blur(10px)}.bo:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.12)}
.ubadge{font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:4px 10px;border-radius:6px}
.ubadge-admin{background:rgba(212,175,55,.1);color:var(--gold);border:1px solid rgba(212,175,55,.15)}

.sec{background:rgba(37,99,235,.04);border:1px solid rgba(37,99,235,.1);border-radius:12px;padding:12px 18px;margin-bottom:20px;font-family:'Montserrat',sans-serif;font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);display:flex;align-items:center;gap:8px;backdrop-filter:blur(10px)}

.tabs{display:flex;gap:4px;margin-bottom:24px;background:rgba(255,255,255,.04);border-radius:12px;padding:4px;width:fit-content;backdrop-filter:blur(10px)}
.tab{padding:9px 20px;border:none;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:transparent;color:var(--fg-muted);position:relative;border-radius:9px;transition:all .2s}
.tab.on{color:#fff;background:var(--accent);box-shadow:0 2px 8px rgba(37,99,235,.3)}
.tab .dot{position:absolute;top:5px;right:5px;width:7px;height:7px;border-radius:50%;background:var(--gold);box-shadow:0 0 6px rgba(212,175,55,.4)}

.sts{display:flex;gap:10px;margin-bottom:24px}
.st{background:rgba(255,255,255,.03);backdrop-filter:blur(10px);padding:20px 24px;flex:1;border-radius:16px;border:1px solid rgba(255,255,255,.06);transition:border-color .2s}
.st:hover{border-color:rgba(255,255,255,.1)}
.stl{font-family:'Montserrat',sans-serif;font-size:10px;color:var(--fg-muted);text-transform:uppercase;letter-spacing:.15em;font-weight:700}
.stv{font-family:'Montserrat',sans-serif;font-size:28px;font-weight:900;margin-top:6px;letter-spacing:-.03em}

.tb{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.tb .inp{width:220px;padding:10px 16px;font-size:13px;border-radius:12px;background:rgba(255,255,255,.04)}
.tb select{padding:10px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:var(--fg);font-size:13px;font-family:'Open Sans',sans-serif}
.tbr{margin-left:auto;display:flex;gap:4px;background:rgba(255,255,255,.04);border-radius:10px;padding:3px}
.bv{padding:7px 16px;border-radius:8px;border:none;background:transparent;color:var(--fg-muted);font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;transition:all .2s}
.bv.on{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(37,99,235,.25)}
.ba{padding:8px 18px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--gold),#c9a52e);color:#121212;font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;box-shadow:0 2px 10px rgba(212,175,55,.2);transition:all .2s}.ba:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(212,175,55,.3)}

.tw{background:rgba(255,255,255,.03);border-radius:16px;overflow-x:auto;border:1px solid rgba(255,255,255,.06);backdrop-filter:blur(10px)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:14px 18px;font-family:'Montserrat',sans-serif;font-size:10px;color:var(--fg-muted);text-transform:uppercase;letter-spacing:.15em;font-weight:700;border-bottom:1px solid rgba(255,255,255,.06)}
td{padding:14px 18px;border-bottom:1px solid rgba(255,255,255,.04)}
tr.cl{cursor:pointer;transition:background .2s}tr.cl:hover{background:rgba(37,99,235,.04)}
.bdg{font-family:'Montserrat',sans-serif;padding:5px 12px;border-radius:8px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}

.pp{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px}
.pc{flex:1;min-width:180px;background:rgba(255,255,255,.03);padding:16px;border-top:3px solid var(--accent);border-radius:16px;border:1px solid rgba(255,255,255,.06)}
.pk{background:rgba(255,255,255,.03);border-radius:12px;padding:14px;border:1px solid rgba(255,255,255,.06);margin-bottom:8px;cursor:pointer;transition:all .2s}.pk:hover{border-color:rgba(37,99,235,.3);background:rgba(37,99,235,.04)}

.li2{background:rgba(255,255,255,.03);border-radius:14px;padding:18px 22px;cursor:pointer;border:1px solid rgba(255,255,255,.06);display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;transition:all .2s;backdrop-filter:blur(10px)}.li2:hover{border-color:rgba(37,99,235,.25);background:rgba(37,99,235,.03)}

.mbg{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.mbox{background:rgba(22,22,32,.92);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:32px;width:500px;max-width:94vw;max-height:90vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.4)}
.mtitle{font-family:'Montserrat',sans-serif;font-size:18px;font-weight:800;text-transform:uppercase;letter-spacing:-.01em;margin-bottom:20px}
.fr{display:flex;gap:12px;margin-bottom:14px}.fr>div{flex:1}
.fr .inp,.fr select,.fr textarea{width:100%;padding:11px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:var(--fg);font-size:14px;outline:none}
.fr .inp:focus,.fr select:focus,.fr textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.fr textarea{min-height:50px;resize:vertical}
.br{display:flex;gap:10px;margin-top:18px}
.bc{flex:1;padding:12px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:transparent;color:var(--fg-muted);font-weight:700;font-size:12px;letter-spacing:.08em;text-transform:uppercase;transition:all .2s}.bc:hover{background:rgba(255,255,255,.04)}
.bs{flex:1;padding:12px;border-radius:12px;border:none;background:var(--accent);color:#fff;font-weight:700;font-size:12px;letter-spacing:.08em;text-transform:uppercase;box-shadow:0 2px 10px rgba(37,99,235,.2);transition:all .2s}.bs:hover{box-shadow:0 4px 16px rgba(37,99,235,.3)}
.bd{width:100%;padding:10px;border-radius:12px;border:1px solid rgba(239,68,68,.12);background:transparent;color:#ef4444;font-weight:700;font-size:11px;letter-spacing:.1em;text-transform:uppercase;margin-top:12px;transition:all .2s}.bd:hover{background:rgba(239,68,68,.04)}

.phr{display:flex;gap:8px}
.phc{width:100px;flex-shrink:0;padding:11px 8px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:var(--fg);font-size:13px}

.cd-wrap{max-width:820px}
.cd-back{display:inline-flex;align-items:center;gap:6px;color:var(--fg-muted);font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;background:none;border:none;margin-bottom:24px;padding:0;transition:color .2s}.cd-back:hover{color:var(--fg)}
.cd-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid rgba(255,255,255,.06)}
.cd-name{font-family:'Montserrat',sans-serif;font-size:32px;font-weight:900;text-transform:uppercase;letter-spacing:-.02em}
.cd-brand{font-size:14px;color:var(--fg-muted);margin-top:4px}
.cd-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;margin-bottom:24px;background:rgba(255,255,255,.04);border-radius:16px;overflow:hidden;border:1px solid rgba(255,255,255,.06)}
.cd-field{background:var(--bg2);padding:18px 20px}
.cd-field-val{font-size:15px;font-weight:600;margin-top:4px}
.cd-section{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:24px;margin-bottom:16px;backdrop-filter:blur(10px)}
.cd-section-title{font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.18em;color:var(--fg-muted);margin-bottom:14px}
.cd-textarea{width:100%;padding:14px 16px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);color:var(--fg);font-size:14px;font-family:'Open Sans',sans-serif;min-height:140px;resize:vertical;outline:none;line-height:1.7;transition:all .2s}.cd-textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.cd-actions{display:flex;gap:10px;margin-top:24px}
.cd-save{padding:12px 24px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--gold),#c9a52e);color:#121212;font-family:'Montserrat',sans-serif;font-weight:800;font-size:11px;letter-spacing:.12em;text-transform:uppercase;transition:all .2s;box-shadow:0 2px 10px rgba(212,175,55,.15)}.cd-save:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(212,175,55,.25)}
.cd-edit{padding:12px 24px;border-radius:12px;border:1px solid rgba(37,99,235,.25);background:rgba(37,99,235,.06);color:var(--accent);font-family:'Montserrat',sans-serif;font-weight:700;font-size:11px;letter-spacing:.1em;text-transform:uppercase;transition:all .2s}.cd-edit:hover{background:rgba(37,99,235,.1)}
.cd-del{padding:12px 24px;border-radius:12px;border:1px solid rgba(239,68,68,.12);background:transparent;color:#ef4444;font-family:'Montserrat',sans-serif;font-weight:700;font-size:11px;letter-spacing:.1em;text-transform:uppercase;transition:all .2s}.cd-del:hover{background:rgba(239,68,68,.04)}
.cd-stage{padding:7px 12px;border-radius:10px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:var(--fg);font-size:13px;font-family:'Open Sans',sans-serif}

.fsm{background:rgba(255,255,255,.02);border-radius:16px;padding:32px;border:1px solid rgba(255,255,255,.06);max-width:600px;backdrop-filter:blur(10px)}
.fsm .inp,.fsm select,.fsm textarea{background:rgba(255,255,255,.04)}.fsm .phc{background:rgba(255,255,255,.04)}
.bau{width:100%;padding:15px;border-radius:12px;border:none;font-family:'Montserrat',sans-serif;font-weight:800;font-size:12px;letter-spacing:.12em;text-transform:uppercase;background:linear-gradient(135deg,var(--gold),#c9a52e);color:#121212;margin-top:10px;transition:all .2s;box-shadow:0 4px 16px rgba(212,175,55,.15)}.bau:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(212,175,55,.25)}.bau.ok{background:linear-gradient(135deg,#10b981,#059669);color:#fff;box-shadow:0 4px 16px rgba(16,185,129,.2)}

.brf{position:fixed;bottom:24px;left:24px;width:42px;height:42px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);backdrop-filter:blur(20px);color:var(--fg-muted);display:flex;align-items:center;justify-content:center;z-index:50;transition:all .2s}.brf:hover{background:rgba(255,255,255,.08);color:var(--fg);border-color:rgba(255,255,255,.12)}

@media(max-width:768px){.d{padding:20px 16px}.fr{flex-direction:column;gap:12px}.sts{flex-direction:column}.tb{flex-direction:column;align-items:stretch}.tb .inp{width:100%}.tbr{margin-left:0}.pp{flex-direction:column}.cd-grid{grid-template-columns:1fr!important}.hdr{flex-direction:column;align-items:flex-start}.cd-layout{grid-template-columns:1fr!important}}
</style>
</head>

<script>
var SU='https://mkxbjcljljmygruoodvv.supabase.co';
var SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1reGJqY2xqbGpteWdydW9vZHZ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NTg5NTgsImV4cCI6MjA5MTMzNDk1OH0.-s7YhaLGv99e_YvJ_bEh_7n4BlaNBF0nPFH5D-UHA9A';
var STAGES=['New Lead','Contacted','Qualified','Proposal','Closed'];
var SCLR={'New Lead':'#2563EB',Contacted:'#D4AF37',Qualified:'#06b6d4',Proposal:'#8b5cf6',Closed:'#10b981'};
var REVS=['Under $10k','$10k-$25k','$25k-$50k','$50k-$100k','$100k-$250k','$250k+'];
var CODES=[{c:'+1',l:'US +1'},{c:'+44',l:'UK +44'},{c:'+61',l:'AU +61'},{c:'+49',l:'DE +49'},{c:'+33',l:'FR +33'},{c:'+48',l:'PL +48'},{c:'+380',l:'UA +380'},{c:'+91',l:'IN +91'},{c:'+55',l:'BR +55'},{c:'+971',l:'AE +971'},{c:'+234',l:'NG +234'}];
var sb=window.supabase.createClient(SU,SK);
var user=null,contacts=[],leads=[],poll=null;
var curTab='crm',curView='table',sq='',sf='All',viewCid=null,showTacos=true,showAcos=true,showAd=true,dateFrom='',dateTo='',showLog=false,expandChart=false;

async function doLogin(){
  var em=document.getElementById('le').value.toLowerCase().trim();
  var pw=document.getElementById('lp').value;
  var er=document.getElementById('lerr');er.classList.add('hide');
  if(!em||!pw){er.textContent='Enter email and password.';er.classList.remove('hide');return}
  var btn=document.querySelector('.bl');btn.textContent='Signing in...';btn.disabled=true;
  var res=await sb.auth.signInWithPassword({email:em,password:pw});
  if(res.error){er.textContent=res.error.message;er.classList.remove('hide');btn.textContent='Sign In';btn.disabled=false;return}
  user={email:res.data.user.email,role:'admin',name:'Admin'};btn.textContent='Sign In';btn.disabled=false;showD();
}
async function doLogout(){await sb.auth.signOut();user=null;if(poll)clearInterval(poll);document.getElementById('ls').classList.remove('hide');document.getElementById('ds').classList.add('hide')}
async function loadC(){var r=await sb.from('contacts').select('*').order('created_at',{ascending:false});contacts=r.data||[]}
async function loadL(){var r=await sb.from('leads').select('*').eq('added_to_crm',false).order('created_at',{ascending:false});leads=r.data||[]}
async function showD(){document.getElementById('ls').classList.add('hide');document.getElementById('ds').classList.remove('hide');await loadC();await loadL();render();if(poll)clearInterval(poll);poll=setInterval(async function(){await loadL();if(curTab!=='form'&&!viewCid)render()},5000)}

function fD(d){try{var p=d.toString().split('T')[0].split('-');if(p.length===3){var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return months[parseInt(p[1])-1]+' '+parseInt(p[2])}return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'})}catch(e){return'-'}}
function sbdg(s){var c=SCLR[s]||'#2563EB';return '<span class="bdg" style="background:'+c+'15;color:'+c+';border:1px solid '+c+'30">'+s+'</span>'}
function copts(s){return CODES.map(function(c){return '<option value="'+c.c+'" '+(c.c===s?'selected':'')+'>'+c.l+'</option>'}).join('')}
function ropts(s){return '<option value="">Select</option>'+REVS.map(function(r){return '<option value="'+r+'" '+(r===s?'selected':'')+'>'+r+'</option>'}).join('')}
function sopts(s){return STAGES.map(function(x){return '<option value="'+x+'" '+(x===s?'selected':'')+'>'+x+'</option>'}).join('')}

function viewContact(id){viewCid=id;render()}
function backToList(){viewCid=null;render()}

function renderChart(tacosData,acosData,adDepData,showT,showA,showAd){
  var allDates={};
  if(showT)tacosData.forEach(function(d){allDates[d.date]=allDates[d.date]||{};allDates[d.date].tacos=d.value});
  if(showA)acosData.forEach(function(d){allDates[d.date]=allDates[d.date]||{};allDates[d.date].acos=d.value});
  if(showAd)adDepData.forEach(function(d){allDates[d.date]=allDates[d.date]||{};allDates[d.date].addep=d.value});
  var keys=Object.keys(allDates).sort(function(a,b){return new Date(a)-new Date(b)});
  if(keys.length<1)return '<div style="background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:40px;text-align:center;color:var(--fg-muted);font-size:12px;font-family:Montserrat,sans-serif;letter-spacing:.08em;text-transform:uppercase">No data yet. Add entries below.</div>';
  var W=600,H=180,PL=48,PR=15,PT=20,PB=28;
  var cw=W-PL-PR,ch=H-PT-PB;
  var allVals=[];
  keys.forEach(function(k){if(allDates[k].tacos!==undefined)allVals.push(allDates[k].tacos);if(allDates[k].acos!==undefined)allVals.push(allDates[k].acos);if(allDates[k].addep!==undefined)allVals.push(allDates[k].addep)});
  var mn=Math.min.apply(null,allVals),mx=Math.max.apply(null,allVals);
  var range=mx-mn;if(range===0)range=10;
  mn=Math.max(0,mn-range*0.2);mx=mx+range*0.2;range=mx-mn;
  var svg='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto">';
  var steps=4;
  for(var i=0;i<=steps;i++){var y=PT+ch-(i/steps)*ch;var v=(mn+(i/steps)*range).toFixed(1);svg+='<line x1="'+PL+'" y1="'+y+'" x2="'+(W-PR)+'" y2="'+y+'" stroke="#2a2a32" stroke-width="1"/>';svg+='<text x="'+(PL-6)+'" y="'+(y+3)+'" fill="#9CA3AF" font-size="9" font-family="Montserrat,sans-serif" text-anchor="end" font-weight="600">'+v+'%</text>';}

    h+='<div class="tb"><input class="inp" placeholder="Search..." value="'+sq+'" oninput="sq=this.value;render()"><select onchange="sf=this.value;render()"><option value="All" '+(sf==='All'?'selected':'')+'>All Stages</option>'+STAGES.map(function(s){return '<option value="'+s+'" '+(sf===s?'selected':'')+'>'+s+'</option>'}).join('')+'</select><div class="tbr"><button class="bv '+(curView==='table'?'on':'')+'" onclick="curView=\'table\';render()">Table</button><button class="bv '+(curView==='pipeline'?'on':'')+'" onclick="curView=\'pipeline\';render()">Pipeline</button><button class="ba" onclick="showCF()">+ Add</button></div></div>';
    var fl=contacts.filter(function(c){return sf==='All'||c.stage===sf}).filter(function(c){var q=sq.toLowerCase();return(c.name||'').toLowerCase().indexOf(q)>=0||(c.brand||'').toLowerCase().indexOf(q)>=0||(c.email||'').toLowerCase().indexOf(q)>=0});
    if(curView==='table'){
      h+='<div class="tw"><table><thead><tr><th>Name</th><th>Brand</th><th>Email</th><th>Phone</th><th>Revenue</th><th>ACOS</th><th>Stage</th><th>Date</th></tr></thead><tbody>';
      fl.forEach(function(c){h+='<tr class="cl" onclick="viewContact('+c.id+')"><td style="font-weight:600">'+c.name+'</td><td style="color:var(--fg-muted)">'+(c.brand||'-')+'</td><td style="color:var(--fg-muted)">'+c.email+'</td><td style="color:var(--fg-muted);font-size:12px">'+(c.phone||'-')+'</td><td style="color:var(--fg-muted);font-size:12px">'+(c.revenue||'-')+'</td><td style="color:var(--fg-muted);font-size:12px">'+(c.acos||'-')+'</td><td>'+sbdg(c.stage)+'</td><td style="color:var(--fg-muted);font-size:12px">'+fD(c.created_at)+'</td></tr>'});
      if(!fl.length)h+='<tr><td colspan="8" style="padding:40px;text-align:center;color:var(--fg-muted);font-family:Montserrat,sans-serif;font-size:12px;letter-spacing:.1em;text-transform:uppercase">No contacts found</td></tr>';
      h+='</tbody></table></div>';
    }else{
      h+='<div class="pp">';
      STAGES.forEach(function(st){var sc=fl.filter(function(c){return c.stage===st});var clr=SCLR[st];h+='<div class="pc" style="border-color:'+clr+'"><div style="display:flex;justify-content:space-between;margin-bottom:12px"><span style="font-family:Montserrat,sans-serif;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em">'+st+'</span><span class="bdg" style="background:'+clr+'15;color:'+clr+';border:1px solid '+clr+'30">'+sc.length+'</span></div>';sc.forEach(function(c){h+='<div class="pk" onclick="viewContact('+c.id+')"><div style="font-weight:600;font-size:12px">'+c.name+'</div><div style="font-size:11px;color:var(--fg-muted);margin-top:3px">'+(c.brand||'-')+'</div><div style="font-size:11px;color:'+clr+';margin-top:5px;font-weight:600;font-family:Montserrat,sans-serif">'+(c.revenue||'-')+'</div></div>'});h+='</div>'});
      h+='</div>';
    }
  }
  h+='<button class="brf" onclick="location.reload()" title="Refresh"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg></button>';
  document.getElementById('dc').innerHTML=h;
}

function showCF(id){
  var c=id?contacts.find(function(x){return x.id===id}):null;var e=!!c;
  var ph=c?c.phone||'':'',cc='+1',nm=ph;
  CODES.forEach(function(x){if(ph.indexOf(x.c+' ')===0){cc=x.c;nm=ph.slice(x.c.length+1)}});
  var html='<div class="mbg" onclick="clM()"><div class="mbox" onclick="event.stopPropagation()"><div class="mtitle">'+(e?'Edit Contact':'New Contact')+'</div>';
  html+='<div class="fr"><div><label class="lbl">Name</label><input class="inp" id="mn" value="'+(c?c.name:'')+'"></div><div><label class="lbl">Brand</label><input class="inp" id="mb" value="'+(c?c.brand:'')+'"></div></div>';
  html+='<div class="fr"><div><label class="lbl">Email</label><input class="inp" id="me" value="'+(c?c.email:'')+'"></div><div><label class="lbl">Phone</label><div class="phr"><select class="phc" id="mc">'+copts(cc)+'</select><input class="inp" id="mp" value="'+nm+'" style="flex:1"></div></div></div>';
  html+='<div class="fr"><div><label class="lbl">Revenue</label><select class="inp" id="mr">'+ropts(c?c.revenue:'')+'</select></div><div><label class="lbl">ACOS</label><input class="inp" id="ma" value="'+(c?c.acos:'')+'"></div></div>';
  html+='<div class="fr"><div><label class="lbl">Stage</label><select class="inp" id="ms">'+sopts(c?c.stage:'New Lead')+'</select></div></div>';
  html+='<div class="fr"><div><label class="lbl">Challenge</label><textarea class="inp" id="mch">'+(c?c.challenge:'')+'</textarea></div></div>';
  html+='<div class="fr"><div><label class="lbl">Notes</label><textarea class="inp" id="mnt" style="min-height:80px">'+(c?c.notes||'':'')+'</textarea></div></div>';
  html+='<div class="br"><button class="bc" onclick="clM()">Cancel</button><button class="bs" onclick="savC('+(id||'null')+')">Save</button></div>';
  if(e)html+='<button class="bd" onclick="delC('+id+');clM()">Delete</button>';
  html+='</div></div>';
  document.getElementById('mc2').innerHTML=html;
}
async function savC(id){
  var o={name:document.getElementById('mn').value,brand:document.getElementById('mb').value,email:document.getElementById('me').value,phone:document.getElementById('mc').value+' '+document.getElementById('mp').value,revenue:document.getElementById('mr').value,acos:document.getElementById('ma').value,stage:document.getElementById('ms').value,challenge:document.getElementById('mch').value,notes:document.getElementById('mnt').value};
  if(id){await sb.from('contacts').update(o).eq('id',id)}else{await sb.from('contacts').insert(o)}
  await loadC();clM();render();
}
async function saveNotes(id){var n=document.getElementById('cdNotes').value;await sb.from('contacts').update({notes:n}).eq('id',id);await loadC();render()}
async function updateStage(id,s){await sb.from('contacts').update({stage:s}).eq('id',id);await loadC();render()}
async function delC(id){await sb.from('contacts').delete().eq('id',id);await loadC();viewCid=null;render()}

function showLD(id){
  var l=leads.find(function(x){return x.id===id});if(!l)return;
  var html='<div class="mbg" onclick="clM()"><div class="mbox" onclick="event.stopPropagation()"><div class="mtitle">Lead Details</div>';
  html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">';
  [['Name',l.name],['Brand',l.brand||'-'],['Email',l.email],['Phone',l.phone||'-'],['Revenue',l.revenue||'-'],['ACOS',l.acos||'-']].forEach(function(x){html+='<div><div class="lbl">'+x[0]+'</div><div style="font-size:14px;font-weight:600;margin-top:4px">'+x[1]+'</div></div>'});
  html+='</div>';
  if(l.challenge)html+='<div><div class="lbl">Challenge</div><div style="font-size:14px;background:#111118;padding:12px 16px;border-radius:3px;border:1px solid var(--border);margin:6px 0 16px;line-height:1.6">'+l.challenge+'</div></div>';
  html+='<div class="br"><button class="bc" onclick="clM()">Close</button><button class="bs" style="background:var(--gold);color:#121212" onclick="addL('+l.id+')">Add to CRM</button></div></div></div>';
  document.getElementById('mc2').innerHTML=html;
}
async function addL(id){var l=leads.find(function(x){return x.id===id});if(!l)return;await sb.from('contacts').insert({name:l.name,brand:l.brand,email:l.email,phone:l.phone||'',stage:'New Lead',revenue:l.revenue||'',acos:l.acos||'',challenge:l.challenge||''});await sb.from('leads').update({added_to_crm:true}).eq('id',id);await loadC();await loadL();clM();curTab='crm';render()}
async function addAllL(){var ins=leads.map(function(l){return{name:l.name,brand:l.brand,email:l.email,phone:l.phone||'',stage:'New Lead',revenue:l.revenue||'',acos:l.acos||'',challenge:l.challenge||''}});if(ins.length)await sb.from('contacts').insert(ins);var ids=leads.map(function(l){return l.id});if(ids.length)await sb.from('leads').update({added_to_crm:true}).in('id',ids);await loadC();await loadL();curTab='crm';render()}
async function simSub(){var n=document.getElementById('sn').value,b=document.getElementById('sb2').value,e=document.getElementById('se').value;if(!n||!e){alert('Name and email required');return}var ph=document.getElementById('scc').value+' '+document.getElementById('sp').value.trim();var rv=document.getElementById('sr').value,ac=document.getElementById('sa').value,ch=document.getElementById('sch').value;var btn=document.getElementById('sbtn');btn.textContent='Submitting...';btn.classList.add('ok');await sb.from('leads').insert({name:n,brand:b,email:e,phone:ph.trim(),revenue:rv,acos:ac,challenge:ch,added_to_crm:false});btn.textContent='Submitted!';await loadL();setTimeout(function(){curTab='leads';render()},1500)}
function clM(){document.getElementById('mc2').innerHTML=''}

window.addEventListener('DOMContentLoaded',async function(){var sess=await sb.auth.getSession();if(sess.data.session){user={email:sess.data.session.user.email,role:'admin',name:'Admin'};showD()}else{document.getElementById('ls').classList.remove('hide');document.getElementById('ds').classList.add('hide')}});
</script>

<div id="ls" class="lw">
<div class="lb">
<div class="lr"><div class="li">EZ<span>Launch</span>Lab</div></div>
<div class="lsub">Sign in to your CRM</div>
<div id="lerr" class="eb hide"></div>
<div class="fld"><label class="lbl">Email</label><input class="inp" id="le" type="email" placeholder="you@ezlaunchlab.com"></div>
<div class="fld"><label class="lbl">Password</label><div class="pww"><input class="inp" id="lp" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()"><button class="pwt" onclick="var i=document.getElementById('lp');i.type=i.type==='password'?'text':'password';this.textContent=i.type==='password'?'Show':'Hide'">Show</button></div></div>
<button class="bl" onclick="doLogin()">Sign In</button>
</div>
</div>
